# Label Studio — reproducible single-container setup (SQLite backend)
#
# Usage:
#   docker compose up -d        # start in background
#   docker compose logs -f      # follow logs
#   docker compose down         # stop (data persists in ./mydata)
#
# Open: http://localhost:8080
#
# All state (SQLite DB, uploaded media, exports) lives in ./mydata,
# so the install behaves identically every time you bring it up.
services:
  label-studio:
    image: heartexlabs/label-studio:1.23.0
    container_name: label-studio
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # Bind to all interfaces inside the container
      - LABEL_STUDIO_HOST=${LABEL_STUDIO_HOST:-}
      # Persist everything (DB + media) under /label-studio/data
      - LABEL_STUDIO_BASE_DATA_DIR=/label-studio/data
      # Allow Label Studio to serve local files mounted into the container
      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=${LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED:-true}
      # Root for Local Storage file serving (container path). Local Storage
      # "Absolute local path" and converter --image-root-url ?d= are relative to this.
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/label-studio/files
    volumes:
      # Existing SQLite DB, media and exports are preserved here
      - ./mydata:/label-studio/data:rw
      # YOLO datasets mounted read-only so Local Storage can serve images.
      # Host  : ./yolo-data-to-label-studio/dataset/images
      # In LS : /label-studio/files/dataset/images   (?d=dataset/images)
      - ./yolo-data-to-label-studio:/label-studio/files:ro
    command: label-studio
